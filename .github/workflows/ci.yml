name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout terra-obia-etl
        uses: actions/checkout@v4

      - name: Checkout terra-OBIA (path dependency)
        uses: actions/checkout@v4
        with:
          repository: hamidmatiny/terra-OBIA
          path: terra-OBIA

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-py311-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py311-

      - name: Install system dependencies for geospatial libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy type check
        run: poetry run mypy terra_etl

      - name: Pytest
        run: poetry run pytest --cov=terra_etl --cov-report=term-missing
